<head>
  <meta charset="utf-8">
  <title>Contact Us</title>
  <meta name="description" content="Website of NGO Aryabhat, Foundation for promoting basic science">
  <meta name="author" content="Alok Mandavgane, Aryabhat Foundation">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" type="text/css" href="css/style.css" media="screen" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    /* ==========================================================
       contact.html — design-system port (scoped: this page only)
       Content unchanged from the original; only presentation
       follows newindex.html / design.md.
       ========================================================== */

    /* Prevent horizontal scroll from any overflowing child
       (e.g., the floated navbar items from css/style.css). */
    html,
    body {
      overflow-x: hidden;
    }

    /* ============================================================
       NAVBAR — lifted from newindex.html
       ============================================================ */
    .navbar {
      position: relative;
      height: auto;
      min-height: 4.4rem;
      background:
        linear-gradient(180deg, rgba(10, 19, 28, 0.96) 0%, rgba(10, 19, 28, 0.86) 100%);
      -webkit-backdrop-filter: blur(16px) saturate(150%);
      backdrop-filter: blur(16px) saturate(150%);
      border-bottom: 1px solid rgba(255, 204, 51, 0.18);
      box-shadow: 0 4px 22px rgba(0, 0, 0, 0.4);
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .navbar::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }

    .navbar::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 2px;
      background: linear-gradient(90deg,
          transparent 0%,
          rgba(255, 204, 51, 0.18) 15%,
          rgba(255, 204, 51, 0.7) 50%,
          rgba(255, 204, 51, 0.18) 85%,
          transparent 100%);
      pointer-events: none;
    }

    .navbar > .container {
      width: max-content;
      min-width: 100%;
      min-height: 4.4rem;
      padding: 0 14px;
      display: flex;
      align-items: center;
    }

    .navbar-list {
      display: flex;
      flex-wrap: nowrap;
      white-space: nowrap;
      align-items: center;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .navbar-item {
      float: none !important;
      flex: 0 0 auto;
      border-bottom: none;
      padding: 0;
      margin-bottom: 0;
    }

    .navbar-item.current {
      background: transparent;
      border-radius: 0;
    }

    .navbar-link {
      display: inline-flex;
      align-items: center;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: .05em;
      text-transform: none;
      line-height: 1.3;
      color: var(--ink);
      margin: 0;
      padding: 11px 20px;
      border-radius: 999px;
      position: relative;
      transition: color .2s ease, background .2s ease, box-shadow .25s ease;
    }

    .navbar-link:hover,
    .navbar-link:focus {
      color: var(--gold-soft);
      background: rgba(255, 204, 51, 0.10);
      outline: 0;
    }

    .navbar-link.active {
      color: var(--gold);
      background: rgba(255, 204, 51, 0.12);
      font-family: var(--font-display);
      font-weight: 600;
      text-transform: none;
      border-radius: var(--brand-shape-tight);
      box-shadow:
        inset 0 0 0 1px rgba(255, 204, 51, 0.4),
        0 0 16px rgba(255, 204, 51, 0.12);
    }

    .navbar-link.active:hover,
    .navbar-link.active:focus {
      color: var(--gold-soft);
      background: rgba(255, 204, 51, 0.18);
    }

    @media (max-width: 700px) {
      .navbar {
        -webkit-mask-image: linear-gradient(90deg,
            #000 0%,
            #000 calc(100% - 56px),
            transparent 100%);
        mask-image: linear-gradient(90deg,
            #000 0%,
            #000 calc(100% - 56px),
            transparent 100%);
      }
    }

    @media (max-width: 600px) {
      .navbar,
      .navbar > .container {
        min-height: 3.5rem;
      }
      .navbar > .container {
        padding: 0 6px;
      }
      .navbar-list {
        gap: 4px;
      }
      .navbar-link {
        font-size: .88rem;
        padding: 8px 14px;
        letter-spacing: .04em;
      }
    }

    /* ============================================================
       TOKENS (mirror of newindex.html — see design.md §1)
       ============================================================ */
    :root {
      --gold: #ffcc33;
      --gold-deep: #ffa41b;
      --gold-soft: #ffe58a;
      --ink: #e6eef7;
      --ink-dim: #9fb3c8;
      --panel: #16223388;
      --panel-solid: #1a2636;
      --border: #2a3d55;
      --accent-cyan: #1EAEDB;
      --font-brand: 'renfrewregular', 'Space Grotesk', Arial, sans-serif;
      --font-display: 'Space Grotesk', 'Outfit', system-ui, sans-serif;
      --font-body: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --brand-shape: 14px 4px 14px 4px;
      --brand-shape-tight: 10px 3px 10px 3px;
    }

    html,
    body {
      font-family: var(--font-body);
    }

    .main h1,
    .main h2,
    .main h3,
    .main h4,
    .main h5,
    .main h6 {
      font-family: var(--font-display);
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .main {
      background-color: #0a131ccc;
      padding: 1.5rem 0 0;
      border-radius: 0;
    }

    /* ============================================================
       BUTTONS — lifted from newindex.html
       ============================================================ */
    .main .button,
    .main button,
    .contact-card .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: .9rem;
      font-weight: 500;
      letter-spacing: .03em;
      text-transform: none;
      height: 44px;
      padding: 0 22px;
      border-radius: var(--brand-shape);
      border: 1px solid rgba(255, 204, 51, 0.5);
      background: transparent;
      background-image: none;
      color: var(--gold);
      text-decoration: none;
      text-shadow: none;
      box-shadow: none;
      cursor: pointer;
      white-space: nowrap;
      transition: background .25s ease, color .25s ease,
        border-color .25s ease, box-shadow .3s ease,
        transform .15s ease;
    }

    .main .button:hover,
    .main .button:focus,
    .contact-card .button:hover {
      background: rgba(255, 204, 51, 0.08);
      color: var(--gold-soft);
      border-color: var(--gold);
      box-shadow: 0 0 24px rgba(255, 204, 51, 0.18);
      transform: translateY(-1px);
      outline: 0;
    }

    .main .button:active,
    .contact-card .button:active {
      transform: translateY(0);
      background: rgba(255, 204, 51, 0.14);
      box-shadow: 0 0 12px rgba(255, 204, 51, 0.25);
      margin-bottom: 1rem;
    }

    /* Primary: gold-on-dark with halo. See design.md §2.2. */
    .main .button.button-primary,
    .contact-card .button.button-primary {
      color: var(--gold);
      font-weight: 600;
      letter-spacing: .03em;
      background: linear-gradient(180deg, #1a2638 0%, #0d1722 100%);
      background-image: linear-gradient(180deg, #1a2638 0%, #0d1722 100%);
      border: 1.5px solid var(--gold);
      box-shadow:
        0 0 22px rgba(255, 204, 51, 0.18),
        inset 0 1px 0 rgba(255, 204, 51, 0.12);
      text-shadow: none;
    }

    .main .button.button-primary:hover,
    .contact-card .button.button-primary:hover {
      color: var(--gold-soft);
      background: linear-gradient(180deg, #243348 0%, #11202f 100%);
      background-image: linear-gradient(180deg, #243348 0%, #11202f 100%);
      border-color: var(--gold-soft);
      box-shadow:
        0 0 32px rgba(255, 204, 51, 0.32),
        inset 0 1px 0 rgba(255, 204, 51, 0.20);
      transform: translateY(-2px);
    }

    .main .button.button-primary:active,
    .contact-card .button.button-primary:active {
      transform: translateY(0);
      box-shadow:
        0 0 16px rgba(255, 204, 51, 0.25),
        inset 0 2px 4px rgba(0, 0, 0, 0.25);
      margin-bottom: 1rem;
    }

    /* ============================================================
       CONTACT CARDS — 2×2 grid on desktop, 1 col on mobile
       Each card maps 1:1 to an original h4 section.
       ============================================================ */
    .contact-wrap {
      max-width: 1000px;
      margin: 1.5rem auto 2.4rem;
      padding: 0 12px;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 600px) {
      .contact-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .contact-card {
      background: linear-gradient(160deg, rgba(30, 45, 66, 0.9), rgba(15, 26, 38, 0.9));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 26px 24px;
      transition: border-color .25s ease, transform .25s ease, box-shadow .25s ease;
    }

    .contact-card:hover {
      border-color: rgba(255, 204, 51, 0.35);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.4);
    }

    .contact-card h4 {
      margin: 0 0 .9rem;
      font-family: var(--font-display);
      font-size: .95rem;
      font-weight: 600;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .contact-card p {
      margin: 0 0 .8rem;
      color: var(--ink);
      font-size: 1.15rem;
      line-height: 1.55;
    }

    .contact-card p:last-child {
      margin-bottom: 0;
    }

    /* Brand emphasis on <em> — the renfrew Aryabhat brand face,
       gold, non-italic, slightly larger to match Outfit's x-height. */
    .contact-card em {
      font-family: var(--font-brand);
      font-style: normal;
      font-weight: 300;
      font-size: 1.25em;
      color: var(--gold);
      letter-spacing: 0.01em;
    }

    .contact-card a:not(.button) {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px dashed rgba(255, 204, 51, 0.45);
      transition: color .2s ease, border-color .2s ease;
      word-break: break-word;
    }

    .contact-card a:not(.button):hover {
      color: var(--gold-soft);
      border-bottom-color: var(--gold);
    }

    .contact-card .button {
      margin-top: .4rem;
      margin-bottom: 0;
    }

    /* ============================================================
       MAP
       ============================================================ */
    .map-wrap {
      max-width: 1000px;
      margin: 0 auto 2.4rem;
      padding: 0 12px;
    }

    .map-frame {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--panel-solid);
      height: clamp(280px, 42vw, 420px);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
    }

    .map-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      filter: saturate(.9) contrast(.95);
    }

    /* Legacy rule from the original page, scoped to its new container */
    .map-frame img {
      max-height: none;
      max-width: none !important;
      background: none !important;
    }

    /* ============================================================
       SOCIALS — original markup, just styled
       ============================================================ */
    .socials-wrap {
      max-width: 1000px;
      margin: 1.4rem auto 0.4rem;
      padding: 0 12px;
      text-align: center;
    }

    .socials-wrap a {
      display: inline-block;
      transition: transform .2s ease, filter .2s ease;
      filter: grayscale(0.2);
    }

    .socials-wrap a:hover {
      transform: translateY(-3px) scale(1.12);
      filter: grayscale(0) drop-shadow(0 0 8px rgba(255, 204, 51, 0.5));
    }

    /* ============================================================
       FOOTER
       ============================================================ */
    .footer-line {
      text-align: center;
      color: var(--ink-dim);
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin: 2.5rem 0 3rem;
      padding-bottom: 1.5rem;
    }

    /* ============================================================
       MOBILE
       ============================================================ */
    @media (max-width: 600px) {
      .main {
        padding-top: 1rem;
      }

      .contact-wrap {
        padding: 0 .5rem;
        margin: 1rem auto 1.6rem;
      }

      .contact-card {
        padding: 22px 20px 20px;
        border-radius: 14px;
      }

      .contact-card h4 {
        font-size: .88rem;
        letter-spacing: .22em;
        margin-bottom: .8rem;
      }

      .contact-card p {
        font-size: 1.05rem;
        line-height: 1.55;
      }

      .map-wrap {
        padding: 0 .5rem;
        margin-bottom: 1.6rem;
      }

      .map-frame {
        border-radius: 14px;
        height: clamp(240px, 60vw, 320px);
      }

      .main .button,
      .contact-card .button {
        font-size: .85rem;
        height: 40px;
        padding: 0 18px;
      }

      .main .button.button-primary,
      .contact-card .button.button-primary {
        font-size: .9rem;
      }

      .footer-line {
        font-size: .75rem;
        letter-spacing: .12em;
        margin: 1.8rem 0 2.2rem;
        padding-bottom: 1rem;
      }
    }
  </style>
</head>
