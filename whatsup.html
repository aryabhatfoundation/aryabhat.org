                    if (aa.alt > peakAlt) { peakAlt = aa.alt; peakTime = d; peakAz = aa.az; }
                }
                if (peakAlt < 8) return;   // core never clears the horizon tonight — the bright Milky Way isn't around
                var aaEve = fixedAltAz(gcRA, gcDec, dark);
                var whenTxt, whereTxt;
                if (aaEve.alt > 18) {
                    whenTxt = 'Up now · at its best under a dark, Moonless sky';
                    whereTxt = 'The glowing core rides in the ' + cardinal(aaEve.az) + '. Get well away from town lights, look ' + cardinal(aaEve.az, true) + ', and give your eyes 15–20 minutes to adapt.';
                } else if (aaEve.alt > 3) {
                    whenTxt = 'Low now · core climbs highest around ' + fmtTime(peakTime);
                    whereTxt = 'The bright core sits low in the ' + cardinal(aaEve.az) + ' this evening and lifts through the night. The faint band already arches overhead — a dark site is everything.';
                } else {
                    whenTxt = 'Faint band overhead · bright core after ' + fmtTime(peakTime);
                    whereTxt = 'The dense core rises into the ' + cardinal(peakAz) + ' later tonight, but on a Moonless night the softer band is already worth hunting straight up.';
                }
                sMilky.push({
                    dur: 9000,
                    html:
                        '<div class="slide-inner">'
                        + '<div class="visual">' + milkyWaySVG() + '</div>'
                        + '<p class="kicker">Our home galaxy · dark skies only</p>'
                        + '<h2>The <em>Milky Way</em></h2>'
                        + '<p class="devnag">आकाशगंगा · Ākāśagangā</p>'
                        + '<p class="body">A soft glowing river of light arching across the whole sky — the combined shine of hundreds of billions of stars in our own galaxy, seen edge-on from the inside. Only a truly dark, Moonless night reveals it.</p>'
                        + '<div class="vischip"><span class="when">' + esc(whenTxt) + '</span><span class="where">' + esc(whereTxt) + '</span></div>'
                        + '<p class="scope-note">🔭 No telescope needed — but sweep <b>binoculars</b> slowly along the band and it dissolves into countless stars.</p>'
                        + factsHTML(['~<b>100 billion</b> stars', '<b>1,00,000</b> light-years wide', 'One orbit ≈ <b>25 crore years</b>'])
                        + '</div>'
                });
            })();

            // ── 7b. METEOR SHOWER (if one is active) ──
            (function () {
                var act = activeShowers(date);
                if (!act.length) return;
                var top = act[0].s, dtp = act[0].daysToPeak;
                var radMap = { 'Quadrantids': 'Boötes', 'Lyrids': 'Lyra', 'Eta Aquariids': 'Aquarius', 'Southern Delta Aquariids': 'Aquarius', 'Perseids': 'Perseus', 'Orionids': 'Orion', 'Leonids': 'Leo', 'Geminids': 'Gemini', 'Ursids': 'Ursa Minor' };
                var rIn = radMap[top.name] || 'its constellation';
                var peakTxt = dtp === 0 ? 'Peaks tonight' : dtp === 1 ? 'Peaks tomorrow night'
                    : dtp === -1 ? 'Peaked last night' : dtp > 0 ? 'Peaks in ' + dtp + ' nights' : 'Peaked ' + (-dtp) + ' nights ago';
                var aaDark = fixedAltAz(top.ra, top.dec, dark);
                var whenTxt = peakTxt + ' · up to ~' + top.zhr + '/hour under a dark sky';
                var whereTxt = aaDark.alt > 25
                    ? 'Its radiant (near ' + rIn + ') rides high in the ' + cardinal(aaDark.az) + ' — well placed all evening. Meteors can streak anywhere, so watch the whole sky.'
                    : aaDark.alt > 3
                        ? 'Its radiant (near ' + rIn + ') sits low in the ' + cardinal(aaDark.az) + ' now — expect more as it climbs after midnight.'
                        : 'Its radiant near ' + rIn + ' rises late — the real show is well after midnight.';
                var moonNote = illumPct > 45
                    ? 'A ' + illumPct + '%-lit Moon will drown the faintest streaks tonight, but the bright ones still cut through.'
                    : 'Little Moon to spoil it tonight — good conditions under a dark sky.';
                var others = act.length > 1 ? ' The ' + act[1].s.name + ' are gently active too.' : '';
                sEvents.push({
                    dur: 9500,
                    html:
                        '<div class="slide-inner">'
                        + '<div class="visual">' + meteorSVG() + '</div>'
                        + '<p class="kicker">Shooting stars</p>'
                        + '<h2>The <em>' + esc(top.name) + '</em></h2>'
                        + '<p class="translit">Meteor shower</p>'
                        + '<p class="body">' + esc(top.blurb + others) + '</p>'
                        + '<div class="vischip"><span class="when">' + esc(whenTxt) + '</span><span class="where">' + esc(whereTxt) + '</span></div>'
                        + '<p class="body dim">🌙 ' + esc(moonNote) + '</p>'
                        + factsHTML(['<b>' + top.zhr + '</b>/hr at peak', 'Dust of <b>' + top.parent + '</b>', 'No telescope — <b>just your eyes</b>'])
                        + '</div>'
                });
            })();

            // ── 7c. BRIGHT SATELLITES (only with fresh orbital data) ──
            (function () {
                var sr = satPasses(win);
                if (!sr.fresh || !sr.passes.length) return;
                var rows = sr.passes.slice(0, 3).map(function (p) {
                    var word = p.peakEl > 60 ? 'a brilliant overhead pass' : p.peakEl > 35 ? 'a bright, high pass' : 'a low pass';
                    return '<li><span class="pass-head"><span class="pass-name">' + esc(p.sat.short) + '</span>'
                        + '<span class="pass-time">' + fmtTime(p.start) + '</span></span>'
                        + '<span class="pass-desc">' + word + ' — from the <b>' + cardinal(p.startAz, true) + '</b> to the <b>' + cardinal(p.endAz, true) + '</b>, up to ' + Math.round(p.peakEl) + '° high</span></li>';
                }).join('');
                var srcNote = tleLive ? 'live orbital data from Celestrak'
                    : 'orbital data updated ' + sr.epoch.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                sEvents.push({
                    dur: 9500,
                    html:
                        '<div class="slide-inner">'
                        + '<div class="visual">' + satTrailSVG() + '</div>'
                        + '<p class="kicker">Passing overhead</p>'
                        + '<h2>Catch a <em>Space Station</em></h2>'
                        + '<p class="translit">Bright satellites</p>'
                        + '<p class="body">A big satellite catches the sunlight and glides across the sky like a fast, steady star — no blinking, no sound. Tonight there ' + (sr.passes.length === 1 ? 'is a pass' : 'are passes') + ' to catch:</p>'
                        + '<ul class="pass-list">' + rows + '</ul>'
                        + '<p class="body dim">Steady and silent, with no flashing lights — that is how you tell it from a plane, and it never twinkles like a star.</p>'
                        + '<p class="pass-src">📡 ' + esc(srcNote) + '</p>'
                        + '</div>'
                });
            })();

            // Assemble in briefing order: cover (already in `slides`) → tonight's
            // time-critical events → Moon → planets → rashis & nakshatras →
            // constellations → Milky Way → deep sky. Outro is appended below.
            slides = slides.concat(sEvents, sMoon, sPlanets, sRashiNak, sConst, sMilky, sDso);

            // ── 8. OUTRO / tips ──
            slides.push({
                dur: 10000,
                html:
                    '<div class="slide-inner center">'
                    + '<p class="kicker">Before you look up</p>'
                    + '<h2>Make the most<br>of the <em>night</em></h2>'
                    + '<ul class="outro-tips">'
                    + '<li><span class="ti">👁️</span><span>Give your eyes <b>20 minutes</b> in the dark. After that you\'ll see many more stars — one bright phone screen resets it.</span></li>'
                    + '<li><span class="ti">🔴</span><span>Use a <b>red light</b>, not white, to read or walk. Red keeps your night-vision intact.</span></li>'
                    + '<li><span class="ti">🌙</span><span>Start with the <b>Moon and planets</b> while it\'s early, then hunt fainter objects once it\'s fully dark.</span></li>'
                    + '<li><span class="ti">🔭</span><span>Look with your <b>eyes first</b>, then binoculars, then the telescope. Learning the sky is half the joy.</span></li>'
                    + '</ul>'
                    + '<p class="body dim" style="margin-top:20px">Clear skies from <b style="color:var(--gold-soft)">Aryabhat</b>. 🔭</p>'
                    + '<a class="story-btn" href="sky.html">← Back to the Sky Map</a>'
                    + '</div>'
            });

            return slides;
        }

        // ── Stories engine ─────────────────────────────────────────
        var slidesEl = document.getElementById('slides');
        var progressEl = document.getElementById('progress');
        var frame = document.getElementById('frame');
        var current = 0;
        var slideData = [];
        var slideEls = [];
        var segEls = [];
        var paused = false;

        function render(date) {
            slideData = buildSlides(date);
            slidesEl.innerHTML = '';
            progressEl.innerHTML = '';
            slideEls = [];
            segEls = [];
            slideData.forEach(function (sl, i) {
                var d = document.createElement('div');
                d.className = 'slide';
                d.innerHTML = sl.html;
                slidesEl.appendChild(d);
                slideEls.push(d);

                var seg = document.createElement('div');
                seg.className = 'pseg';
                var fill = document.createElement('span');
                fill.className = 'pseg-fill';
                seg.appendChild(fill);
                progressEl.appendChild(seg);
                segEls.push(seg);
            });
            current = 0;
            show(0);
        }

        // Progress is driven by requestAnimationFrame rather than CSS
        // animation — deterministic across browsers, and pause/resume is
        // just a flag. Each segment's fill is a scaleX(0..1) transform.
        var rafId = null, lastTs = 0, segElapsed = 0, segDur = 0;

        function setFill(fill, p) {
            if (fill) fill.style.transform = 'scaleX(' + Math.max(0, Math.min(1, p)) + ')';
        }
        function stopRaf() {
            if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        }
        function frameStep(ts) {
            var dt = lastTs ? (ts - lastTs) : 0;
            lastTs = ts;
            if (!paused && segDur > 0) {
                segElapsed += dt;
                var p = segElapsed / segDur;
                setFill(segEls[current] && segEls[current].firstChild, p);
                if (p >= 1) { rafId = null; next(); return; }
            }
            rafId = requestAnimationFrame(frameStep);
        }
        function startRaf() {
            stopRaf();
            lastTs = 0;
            segElapsed = 0;
            rafId = requestAnimationFrame(frameStep);
        }

        function show(idx) {
            stopRaf();
            current = idx;
            slideEls.forEach(function (el, i) { el.classList.toggle('active', i === idx); });
            frame.classList.toggle('cover', idx === 0);  // hide corner watermark on the cover
            // reset active slide scroll
            var inner = slideEls[idx].querySelector('.slide-inner');
            if (inner) inner.scrollTop = 0;

            segEls.forEach(function (seg, i) {
                seg.classList.toggle('active', i === idx);
                seg.classList.toggle('done', i < idx);
                // Explicitly set every fill so there's no ambiguity:
                // past = full, current = empty (about to grow), future = empty.
                setFill(seg.firstChild, i < idx ? 1 : 0);
            });

            segDur = slideData[idx].dur;
            if (reduced) { setFill(segEls[idx].firstChild, 1); return; } // manual advance
            startRaf();
        }

        function next() { if (current < slideData.length - 1) show(current + 1); else exit(); }
        function prev() { if (current > 0) show(current - 1); else show(0); }

        function pause() {
            paused = true;
            frame.classList.add('paused');
            var hint = document.getElementById('tapHint');
            if (hint) hint.style.opacity = '0';
        }
        function resume() {
            paused = false;
            frame.classList.remove('paused');
            var hint = document.getElementById('tapHint');
            if (hint) hint.style.opacity = '';
        }

        function exit() {
            if (document.referrer && document.referrer.indexOf('sky.html') !== -1) {
                history.back();
            } else {
                window.location.href = 'sky.html';
            }
        }

        // ── Gestures: tap zones, hold-to-pause, swipe ──
        var pdown = null, holdTimer = null, holding = false;
        frame.addEventListener('pointerdown', function (e) {
            if (e.target.closest('.story-top')) return; // don't hijack controls
            pdown = { x: e.clientX, y: e.clientY, t: Date.now() };
            holding = false;
            holdTimer = setTimeout(function () { holding = true; pause(); }, 220);
        });
        frame.addEventListener('pointerup', function (e) {
            if (!pdown) return;
            clearTimeout(holdTimer);
            var dx = e.clientX - pdown.x;
            var dy = e.clientY - pdown.y;
            if (holding) { holding = false; resume(); pdown = null; return; }
            pdown = null;
            if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)) {
                if (dx < 0) next(); else prev();
                return;
            }
            if (Math.abs(dx) < 12 && Math.abs(dy) < 12) {
                var rect = frame.getBoundingClientRect();
                if ((e.clientX - rect.left) < rect.width * 0.32) prev(); else next();
            }
        });
        frame.addEventListener('pointercancel', function () {
            clearTimeout(holdTimer);
            if (holding) { holding = false; resume(); }
            pdown = null;
        });
        frame.addEventListener('pointerleave', function () {
            clearTimeout(holdTimer);
            if (holding) { holding = false; resume(); }
            pdown = null;
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
            else if (e.key === 'Escape') { exit(); }
        });

        document.getElementById('closeBtn').addEventListener('click', function (e) {
            e.preventDefault(); exit();
        });

        // ── Date control ──
        function toInputValue(d) {
            var m = (d.getMonth() + 1).toString().padStart(2, '0');
            var day = d.getDate().toString().padStart(2, '0');
            return d.getFullYear() + '-' + m + '-' + day;
        }
        function isTonight(d) {
            var t = new Date(); return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
        }
        function updateDateLabel() {
            document.getElementById('dateBtnLabel').textContent =
                isTonight(selectedDate) ? 'Tonight' : selectedDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }
        var dateInput = document.getElementById('dateInput');
        dateInput.value = toInputValue(selectedDate);
        dateInput.addEventListener('change', function () {
            var d = parseDateParam(this.value);
            if (d) { selectedDate = d; updateDateLabel(); syncURL(); render(selectedDate); }
        });
        // Desktop browsers don't pop the calendar on a plain click of a
        // (transparent) date field — open it explicitly on the pill.
        document.getElementById('dateBtn').addEventListener('click', function (e) {
            if (e.target === dateInput) return;      // native tap already handles it
            if (dateInput.showPicker) { try { dateInput.showPicker(); } catch (err) { dateInput.focus(); } }
        });

        // ── City control ──
        var citySel = document.getElementById('citySelect');
        function updateCityLabel() {
            document.getElementById('cityLabel').textContent = loc.name;
        }
        function renderCityOptions() {
            var html = '';
            if (loc.custom) html += '<option value="__custom" selected>' + esc(loc.name) + '</option>';
            CITIES.forEach(function (c) {
                var isSel = !loc.custom && c.name === loc.name;
                html += '<option value="' + esc(c.name) + '"' + (isSel ? ' selected' : '') + '>' + esc(c.name) + '</option>';
            });
            citySel.innerHTML = html;
        }
        function applyLocation(newLoc, redraw) {
            loc = newLoc;
            LAT = loc.lat; LNG = loc.lng; PLACE = loc.name;
            observer = new Astronomy.Observer(LAT, LNG, 500);
            renderCityOptions();
            updateCityLabel();
            syncURL();
            if (redraw) render(selectedDate);
        }
        citySel.onchange = function () {
            var c = findCity(this.value);
            if (c) applyLocation({ name: c.name, lat: c.lat, lng: c.lng }, true);
        };
        renderCityOptions();

        // Nearest listed city to a lat/lng (flat approx — fine at city scale).
        function nearestCity(lat, lng) {
            var best = null, bestD = Infinity;
            var kx = Math.cos(lat * Math.PI / 180);
            CITIES.forEach(function (c) {
                var dLat = c.lat - lat, dLng = (c.lng - lng) * kx;
                var d = dLat * dLat + dLng * dLng;
                if (d < bestD) { bestD = d; best = c; }
            });
            return { city: best, deg: Math.sqrt(bestD) };
        }
        // Seed the location from the browser's geolocation when the URL
        // gave us no city (and no explicit lat/lng). Falls back silently.
        function seedFromGeolocation() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(function (pos) {
                // Don't yank the viewer if they've already left the cover.
                if (current !== 0) return;
                var la = pos.coords.latitude, lo = pos.coords.longitude;
                var nc = nearestCity(la, lo);
                if (nc.city && nc.deg < 1.8) {           // ~200 km: use the named city
                    applyLocation({ name: nc.city.name, lat: nc.city.lat, lng: nc.city.lng }, true);
                } else {                                  // far from any listed city
                    applyLocation({ name: 'Your location', lat: la, lng: lo, custom: true }, true);
                }
            }, function () { /* denied / unavailable — keep default */ },
                { timeout: 8000, maximumAge: 30 * 60 * 1000 });
        }

        // Try to pull fresh TLEs live from Celestrak (a stable, CORS-enabled
        // source); fall back silently to the bundled ones on any failure.
        function refreshTLEs() {
            if (typeof fetch === 'undefined' || !window.WHATSUP_TLE) return;
            var byId = {};
            WHATSUP_TLE.forEach(function (s) { if (s.catnr) byId[String(s.catnr)] = s; });
            if (!Object.keys(byId).length) return;
            var ctrl = new AbortController();
            var to = setTimeout(function () { ctrl.abort(); }, 6000);
            fetch('https://celestrak.org/NORAD/elements/gp.php?GROUP=stations&FORMAT=TLE', { signal: ctrl.signal })
                .then(function (r) { if (!r.ok) throw 0; return r.text(); })
                .then(function (txt) {
                    clearTimeout(to);
                    var lines = txt.split(/\r?\n/), updated = 0;
                    for (var i = 0; i < lines.length - 1; i++) {
                        var l1 = lines[i].trim(), l2 = (lines[i + 1] || '').trim();
                        if (l1.charAt(0) === '1' && l2.charAt(0) === '2') {
                            var id = l1.substring(2, 7).replace(/\D/g, '');
                            if (byId[id]) { byId[id].l1 = l1; byId[id].l2 = l2; updated++; }
                        }
                    }
                    if (updated > 0) { tleLive = true; if (current === 0) render(selectedDate); }
                })
                .catch(function () { clearTimeout(to); /* keep bundled TLEs */ });
        }

        // ── Shareable URL (city + date embedded, on the .html page) ──
        function currentShareURL() {
            var p = new URLSearchParams();
            if (loc.custom) {
                p.set('lat', LAT); p.set('lng', LNG);
                if (PLACE) p.set('place', PLACE);
            } else {
                p.set('city', loc.name);
            }
            p.set('date', toInputValue(selectedDate));
            // Base off the full href (strip any query/hash). Using
            // origin+pathname breaks on file:// where origin is "null".
            var base = window.location.href.split('#')[0].split('?')[0];
            return base + '?' + p.toString();
        }
        // Keep the address bar in sync so a manual copy also works.
        function syncURL() {
            try { window.history.replaceState(null, '', currentShareURL()); } catch (e) { /* file:// etc. */ }
        }

        var toastTimer = null;
        function showToast(msg) {
            var t = document.getElementById('toast');
            if (!t) return;
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function () { t.classList.remove('show'); }, 2200);
        }
        function doShare() {
            var url = currentShareURL();
            var when = isTonight(selectedDate) ? 'tonight' : 'on ' + selectedDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            var shareData = {
                title: "What's Up · " + loc.name,
                text: "What's up in the sky over " + loc.name + ' ' + when + ' — a quick tour:',
                url: url
            };
            if (navigator.share) {
                navigator.share(shareData).catch(function () { /* user cancelled */ });
            } else if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(function () { showToast('Link copied'); },
                    function () { window.prompt('Copy this link:', url); });
            } else {
                window.prompt('Copy this link:', url);
            }
        }
        document.getElementById('shareBtn').addEventListener('click', function (e) {
            e.preventDefault(); doShare();
        });

        // Did the URL pin a location? If not, we may seed from geolocation.
        var hadLocationParam = !!params.get('city') || (!isNaN(qLat) && !isNaN(qLng));

        // ── Boot ──
        function boot() {
            updateCityLabel();
            updateDateLabel();
            syncURL();
            render(selectedDate);
            // Optional deep-link to a specific slide (?slide=N), handy for
            // jumping straight to a topic during a talk.
            var startAt = parseInt(params.get('slide'), 10);
            if (!isNaN(startAt) && startAt > 0 && startAt < slideData.length) show(startAt);
            // No city given → try to centre on the viewer's location.
            if (!hadLocationParam) seedFromGeolocation();
            // Pull fresh satellite elements in the background.
            refreshTLEs();
            // hide the tap hint after a few slides worth of time
            setTimeout(function () {
                var hint = document.getElementById('tapHint');
                if (hint) hint.style.transition = 'opacity .6s', hint.style.opacity = '0';
            }, 6000);
        }
        if (typeof Astronomy === 'undefined' || typeof SunCalc === 'undefined') {
            // libraries still loading; wait a tick
            window.addEventListener('load', boot);
        } else {
            boot();
        }
    })();
    </script>
</body>
