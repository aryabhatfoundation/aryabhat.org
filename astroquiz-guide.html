<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>AstroQuiz Guide for Schools · Aryabhat</title>
    <meta name="description" content="A story-style guide for schools: everything you need to know to take part in the Aryabhat Astronomy Quiz — why join, who is eligible, and how to register.">
    <meta name="author" content="Aryabhat Foundation">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Aryabhat Foundation">
    <meta property="og:title" content="Aryabhat Astronomy Quiz — A guide for schools">
    <meta property="og:description" content="Why join, who can take part, and how to register your school — in a quick tap-through story. आर्यभट एस्ट्रोनॉमी क्विज़ में भाग लेने की पूरी जानकारी.">
    <meta property="og:image" content="https://aryabhat.org/images/aq/isro.jpg">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --gold: #ffcc33;
            --gold-deep: #ffa41b;
            --gold-soft: #ffe58a;
            --ink: #e6eef7;
            --ink-dim: #9fb3c8;
            --panel: #16223388;
            --panel-solid: #1a2636;
            --border: #2a3d55;
            --accent-cyan: #1EAEDB;
            --green: #66bb6a;
            --font-brand: 'renfrewregular', 'Space Grotesk', Arial, sans-serif;
            --font-display: 'Space Grotesk', 'Outfit', system-ui, sans-serif;
            --font-body: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-dev: 'Noto Sans Devanagari', 'Outfit', system-ui, sans-serif;
            --brand-shape: 10px;
        }

        /* Aryabhat brand wordmark font (design.md §1) — same face the main
           site uses; needed here for the "Aryabhat Foundation" sign-off. */
        @font-face {
            font-family: 'renfrewregular';
            src: url('css/renfrew-webfont.woff2') format('woff2'),
                 url('css/renfrew-webfont.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #04060a;
            font-family: var(--font-body);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }

        /* ============================================================
           STORIES SHELL — phone-column on desktop, full-bleed on phone
           ============================================================ */
        #stories {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .story-frame {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100%;
            max-height: 100vh;
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 120%, #14243a 0%, #0a1018 55%, #04060a 100%);
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: pan-y;
        }

        @media (min-width: 620px) {
            #stories { padding: 18px; }
            .story-frame {
                height: min(92vh, 860px);
                border-radius: 22px;
                box-shadow: 0 20px 70px rgba(0, 0, 0, .6), 0 0 0 1px rgba(255, 204, 51, .10);
            }
        }

        /* ---- Progress segments ---- */
        .progress-row {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 6;
            display: flex;
            gap: 4px;
            padding: 10px 12px 6px;
            padding-top: max(10px, env(safe-area-inset-top));
            pointer-events: none;
        }
        .pseg {
            flex: 1 1 0;
            height: 4px;
            border-radius: 4px;
            background: rgba(255, 255, 255, .16);
            overflow: hidden;
        }
        .pseg-fill {
            display: block;
            height: 100%;
            width: 100%;
            transform: scaleX(0);
            transform-origin: left center;
            background: linear-gradient(90deg, var(--gold-deep), var(--gold));
            box-shadow: 0 0 5px rgba(255, 204, 51, .55);
            border-radius: 4px;
        }

        /* ---- Top bar ---- */
        .story-top {
            position: absolute;
            left: 0; right: 0;
            top: calc(14px + env(safe-area-inset-top));
            z-index: 6;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px 0;
        }
        .story-brand {
            font-family: var(--font-brand);
            font-size: 1.05rem;
            letter-spacing: .02em;
            color: var(--ink);
            text-shadow: 0 0 8px rgba(255, 255, 255, .35), 0 2px 3px rgba(0, 0, 0, .6);
            white-space: nowrap;
            flex: 0 1 auto;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .top-controls {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
        }
        .story-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            width: 32px;
            height: 32px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, .22);
            background: rgba(10, 19, 28, .5);
            color: var(--ink);
            font-size: 1.05rem;
            line-height: 1;
            text-decoration: none;
            cursor: pointer;
            padding: 0;
        }
        .story-icon svg { width: 17px; height: 17px; display: block; }
        .story-icon:hover { background: rgba(255, 255, 255, .12); }
        #shareBtn { color: var(--gold); border-color: rgba(255, 204, 51, .4); }
        #voiceBtn.on {
            color: #04060a;
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 14px rgba(255, 204, 51, .5);
        }
        /* Draw the eye to the narration control while on the cover. */
        .story-frame.cover #voiceBtn:not(.on) {
            border-color: rgba(255, 204, 51, .6);
            color: var(--gold);
            animation: btnPulse 2.4s ease-out infinite;
        }
        @keyframes btnPulse {
            0%   { box-shadow: 0 0 0 0 rgba(255, 204, 51, .5); }
            70%  { box-shadow: 0 0 0 11px rgba(255, 204, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 204, 51, 0); }
        }

        /* ---- cover narration call-to-action ---- */
        .voice-cta {
            display: inline-flex;
            align-items: center;
            gap: 11px;
            margin: 24px 0 0;
            padding: 12px 22px 12px 18px;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: .98rem;
            color: #04060a;
            background: linear-gradient(180deg, var(--gold-soft), var(--gold));
            border: none;
            border-radius: 999px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 164, 27, .3);
            animation: ctaPulse 2.4s ease-out infinite;
        }
        .voice-cta .ic { font-size: 1.3rem; line-height: 1; }
        .voice-cta .cta-txt { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.15; text-align: left; }
        .voice-cta .cta-txt small { font-family: var(--font-dev); font-weight: 500; font-size: .72rem; opacity: .72; margin-top: 2px; }
        @keyframes ctaPulse {
            0%   { box-shadow: 0 6px 20px rgba(255, 164, 27, .3), 0 0 0 0 rgba(255, 204, 51, .5); }
            70%  { box-shadow: 0 6px 20px rgba(255, 164, 27, .3), 0 0 0 15px rgba(255, 204, 51, 0); }
            100% { box-shadow: 0 6px 20px rgba(255, 164, 27, .3), 0 0 0 0 rgba(255, 204, 51, 0); }
        }
        .cta-alt {
            margin: 11px 0 0;
            font-size: .74rem;
            font-family: var(--font-dev);
            color: var(--ink-dim);
            letter-spacing: .01em;
        }
        /* Once narration is on, the cover CTA is redundant. */
        .story-frame.voice-on .voice-cta,
        .story-frame.voice-on .cta-alt { display: none; }
        @media (prefers-reduced-motion: reduce) {
            .voice-cta, .story-frame.cover #voiceBtn:not(.on) { animation: none; }
        }

        .story-toast {
            position: absolute;
            left: 50%;
            bottom: calc(58px + env(safe-area-inset-bottom));
            transform: translateX(-50%) translateY(10px);
            z-index: 8;
            padding: 9px 16px;
            border-radius: 999px;
            background: rgba(10, 19, 28, .92);
            border: 1px solid rgba(255, 204, 51, .4);
            color: var(--gold-soft);
            font-family: var(--font-display);
            font-size: .8rem;
            font-weight: 600;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s ease, transform .25s ease;
        }
        .story-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ---- Slides ---- */
        .slides { position: absolute; inset: 0; z-index: 1; }
        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity .38s ease;
            display: flex;
        }
        .slide.active { opacity: 1; visibility: visible; }

        .slide-inner {
            position: relative;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 78px 26px calc(70px + env(safe-area-inset-bottom));
            scrollbar-width: none;
        }
        .slide-inner::-webkit-scrollbar { display: none; }
        .slide-inner.center { justify-content: center; }
        .slide-inner > * { max-width: 100%; }

        .kicker {
            font-family: var(--font-display);
            font-size: .72rem;
            font-weight: 600;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: var(--gold);
            margin: 0 0 10px;
        }
        .slide h2 {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(1.6rem, 6.6vw, 2.2rem);
            line-height: 1.1;
            letter-spacing: -0.01em;
            margin: 0 0 2px;
        }
        .slide h2 em { color: var(--gold); font-style: normal; }
        .slide .devnag {
            font-family: var(--font-dev);
            font-size: 1.12rem;
            color: var(--gold-soft);
            margin: 8px 0 0;
            letter-spacing: .01em;
            line-height: 1.5;
        }
        .slide p.body {
            font-size: clamp(.96rem, 3.6vw, 1.05rem);
            line-height: 1.55;
            color: var(--ink);
            margin: 16px 0 0;
            max-width: min(30rem, 100%);
        }
        .slide p.body.dev { font-family: var(--font-dev); }
        .slide p.body.dim { color: var(--ink-dim); }

        /* reassurance chip */
        .vischip {
            margin: 18px 0 0;
            display: inline-flex;
            flex-direction: column;
            gap: 3px;
            align-items: center;
            padding: 11px 20px;
            border-radius: 14px;
            background: rgba(102, 187, 106, .10);
            border: 1px solid rgba(102, 187, 106, .35);
            max-width: min(30rem, 100%);
        }
        .vischip .when {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1rem;
            color: #b7f5c0;
        }
        .vischip .where { font-size: .82rem; color: var(--ink-dim); }

        /* fact pills */
        .facts {
            list-style: none;
            margin: 18px 0 0;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            justify-content: center;
            max-width: min(30rem, 100%);
        }
        .facts li {
            font-size: .78rem;
            line-height: 1.3;
            color: var(--ink-dim);
            background: rgba(255, 255, 255, .045);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 12px;
        }
        .facts li b { color: var(--ink); font-weight: 600; }

        /* ---- photos ---- */
        .photo {
            width: 100%;
            max-width: min(30rem, 100%);
            border-radius: 16px;
            margin: 18px 0 0;
            border: 1px solid var(--border);
            box-shadow: 0 14px 34px rgba(0, 0, 0, .5);
            display: block;
        }
        .photo.chart {
            background: #fff;
            padding: 8px;
        }
        .photo-cap {
            margin: 9px 0 0;
            font-size: .78rem;
            color: var(--ink-dim);
        }

        /* ---- numbered / feature cards ---- */
        /* The list grows to fill the slide's height, and each card shares
           that height equally so the trio never clusters in the top half. */
        .cardlist {
            list-style: none;
            margin: 24px 0 6px;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: min(28rem, 100%);
            flex: 1 1 auto;
            justify-content: center;
        }
        .cardlist li {
            display: flex;
            gap: 16px;
            align-items: center;
            text-align: left;
            background: linear-gradient(160deg, rgba(30, 45, 66, .7), rgba(15, 26, 38, .7));
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 19px;
            flex: 1 1 0;
            min-height: 84px;
            max-height: 160px;
        }
        .cardlist .idx {
            flex: 0 0 auto;
            width: 38px; height: 38px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.15rem;
            color: #04060a;
            background: linear-gradient(180deg, var(--gold), var(--gold-deep));
            box-shadow: 0 0 12px rgba(255, 204, 51, .3);
        }
        .cardlist .ico {
            flex: 0 0 auto;
            font-size: 2rem;
            width: 40px; text-align: center;
            filter: drop-shadow(0 0 8px rgba(255, 204, 51, .25));
        }
        .cardlist .txt { min-width: 0; }
        .cardlist .en {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.08rem;
            line-height: 1.2;
            color: var(--ink);
            display: block;
        }
        .cardlist .hi {
            font-family: var(--font-dev);
            font-size: .92rem;
            color: var(--ink-dim);
            display: block;
            margin-top: 4px;
            line-height: 1.45;
        }

        /* ---- inspiring gallery (image-forward cards) ---- */
        .gallery {
            list-style: none;
            margin: 20px 0 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: min(30rem, 100%);
        }
        .gallery li {
            position: relative;
            text-align: left;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0, 0, 0, .45);
        }
        .gallery img {
            display: block;
            width: 100%;
            height: min(42vw, 190px);
            object-fit: cover;
        }
        .gallery .txt {
            display: block;
            padding: 11px 14px 13px;
        }
        .gallery .en {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: .98rem;
            color: var(--ink);
            display: block;
        }
        .gallery .sub {
            font-size: .8rem;
            color: var(--ink-dim);
            display: block;
            margin-top: 3px;
            line-height: 1.4;
        }

        /* ---- format card ---- */
        .fmt-card {
            width: 100%;
            max-width: min(27rem, 100%);
            margin: 18px 0 0;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: linear-gradient(160deg, rgba(30, 45, 66, .7), rgba(15, 26, 38, .8));
            overflow: hidden;
            text-align: left;
        }
        .fmt-head {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .fmt-head .xls {
            flex: 0 0 auto;
            width: 34px; height: 34px; border-radius: 8px;
            background: #1b7f4b;
            color: #fff; font-family: var(--font-display); font-weight: 700; font-size: .72rem;
            display: flex; align-items: center; justify-content: center;
        }
        .fmt-head .ttl { font-family: var(--font-display); font-weight: 600; font-size: .92rem; color: var(--ink); }
        .fmt-head .sub { font-size: .74rem; color: var(--ink-dim); }
        .fmt-rows { padding: 11px 15px; display: flex; flex-direction: column; gap: 7px; }
        .fmt-rows .r {
            display: flex; justify-content: space-between; gap: 10px;
            font-size: .82rem; color: var(--ink-dim);
            padding-bottom: 6px; border-bottom: 1px dashed rgba(255, 255, 255, .08);
        }
        .fmt-rows .r:last-child { border-bottom: 0; padding-bottom: 0; }
        .fmt-rows .r b { color: var(--gold-soft); font-weight: 600; }

        /* ---- flow (fewer computers) ---- */
        .flow {
            margin: 22px 0 0;
            display: flex; align-items: center; gap: 8px;
            flex-wrap: wrap; justify-content: center;
        }
        .flow .node {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            padding: 13px 15px; border-radius: 14px;
            background: rgba(255, 255, 255, .045);
            border: 1px solid var(--border);
            min-width: 92px;
        }
        .flow .node .em { font-size: 1.8rem; }
        .flow .node .lb { font-size: .74rem; color: var(--ink-dim); font-weight: 600; }
        .flow .node.ok { background: rgba(102, 187, 106, .1); border-color: rgba(102, 187, 106, .35); }
        .flow .node.ok .lb { color: #b7f5c0; }
        .flow .arrow { color: var(--gold); font-size: 1.3rem; }

        /* ---- clock / dial visuals ---- */
        .dial-wrap {
            width: min(52vw, 210px);
            height: min(52vw, 210px);
            margin: 12px 0 4px;
            flex: 0 0 auto;
        }
        .dial-wrap svg { width: 100%; height: 100%; display: block; }

        /* ---- randomizer wheel ---- */
        .wheel-wrap {
            width: min(52vw, 210px);
            height: min(52vw, 210px);
            margin: 12px 0 4px;
            flex: 0 0 auto;
            position: relative;
        }
        .wheel-wrap svg { width: 100%; height: 100%; display: block; }
        .wheel-spin { transform-origin: 100px 100px; animation: wheelSpin 9s linear infinite; }
        @keyframes wheelSpin { to { transform: rotate(360deg); } }

        /* ---- contact card ---- */
        .contact-card {
            width: 100%;
            max-width: min(27rem, 100%);
            margin: 20px 0 0;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: linear-gradient(160deg, rgba(30, 45, 66, .7), rgba(15, 26, 38, .8));
            padding: 15px 17px;
            text-align: left;
        }
        .contact-card .org { font-family: var(--font-brand); font-weight: 400; font-size: 1.25rem; letter-spacing: .01em; color: var(--gold); text-shadow: 0 0 10px rgba(255, 204, 51, .2); }
        .contact-card .addr { font-size: .82rem; color: var(--ink-dim); margin: 3px 0 11px; }
        .contact-card a.crow {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 0;
            border-top: 1px solid rgba(255, 255, 255, .08);
            color: var(--ink); text-decoration: none; font-size: .9rem;
        }
        .contact-card a.crow .em { font-size: 1.1rem; width: 22px; text-align: center; }
        .contact-card a.crow b { color: var(--ink); font-weight: 600; }

        .btnrow {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
            margin: 20px 0 0; width: 100%; max-width: min(27rem, 100%);
        }
        .story-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 46px;
            padding: 0 20px;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: .9rem;
            color: var(--gold);
            text-decoration: none;
            background: linear-gradient(180deg, #1a2638 0%, #0d1722 100%);
            border: 1.5px solid var(--gold);
            border-radius: var(--brand-shape);
            box-shadow: 0 0 22px rgba(255, 204, 51, .16);
            cursor: pointer;
            flex: 0 0 auto;
            justify-content: center;
        }
        /* Only stretch to share the row on the contact slide. */
        .btnrow .story-btn { flex: 1 1 auto; }
        .story-btn.wa { color: #b7f5c0; border-color: rgba(102, 187, 106, .7); box-shadow: 0 0 22px rgba(102, 187, 106, .15); }

        /* ---- closing "Best of Luck" sign-off (centered in the space left
               below the buttons on the last slide) ---- */
        .signoff {
            margin: auto 0;          /* absorb the leftover space above & below → vertically centered */
            padding-top: 14px;
            width: 100%;
            max-width: min(27rem, 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .best-luck {
            font-family: var(--font-brand);
            font-size: clamp(1.9rem, 9.5vw, 2.5rem);
            line-height: 1.02;
            letter-spacing: .01em;
            /* sweeping gold shimmer clipped to the text */
            background: linear-gradient(100deg, var(--gold-deep) 0%, var(--gold-soft) 28%, #fff 48%, var(--gold-soft) 68%, var(--gold-deep) 100%);
            background-size: 220% auto;
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; color: transparent;
            filter: drop-shadow(0 0 14px rgba(255, 204, 51, .35));
            animation: luckShimmer 3.4s linear infinite, luckPulse 2.8s ease-in-out infinite;
        }
        .best-luck-sub {
            font-family: var(--font-dev);
            font-size: 1.22rem;
            color: var(--gold-soft);
            margin: 2px 0 0;
        }
        @keyframes luckShimmer { to { background-position: 220% center; } }
        @keyframes luckPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }

        /* ---- cover ---- */
        .visual-stars {
            width: min(72vw, 260px);
            height: 100px;
            margin: 2px 0 4px;
            flex: 0 0 auto;
        }

                dur: 6000, audio: 'files/aq-audio/v12.mp3', center: true,
                html:
                    '<p class="kicker">The math · 2</p>' +
                    '<h2>~5 minutes <em>per child</em></h2>' +
                    '<div class="dial-wrap">' + dial([
                        { a0: 0, a1: 108, fill: 'rgba(255,204,51,.34)' },
                        { a0: 108, a1: 180, fill: 'rgba(255,120,60,.4)' }
                    ], '5', 'MIN') + '</div>' +
                    '<p class="body dev">आने-जाने का समय जोड़ लें तब भी सामान्यतः कोई बच्चा पाँच मिनट से ज़्यादा computer पर नहीं रुकता।</p>'
            },
            {   // 12 — 12 per hour
                dur: 6500, audio: 'files/aq-audio/v13.mp3', center: true,
                html:
                    '<p class="kicker">The math · 3</p>' +
                    '<h2>12 children <em>per computer, hourly</em></h2>' +
                    '<div class="dial-wrap">' + pie12() + '</div>' +
                    '<p class="body dev">इस तरह एक घंटे में एक computer पर बारह बच्चे quiz पूरी कर सकते हैं — दस तो आराम से।</p>' +
                    '<div class="vischip"><span class="when">1 computer × 1 hour = 12 kids</span></div>'
            },
            {   // 13 — randomizer
                dur: 6500, audio: 'files/aq-audio/v14.mp3', center: true,
                html:
                    '<p class="kicker">No shortcuts</p>' +
                    '<h2>Everyone gets a <em>different set</em></h2>' +
                    '<div class="wheel-wrap">' + wheel() + '</div>' +
                    '<p class="body dev">यह चिंता न करें कि बाहर निकलकर बच्चे सवाल बता देंगे — software का randomiser हर बच्चे को अलग set of questions देता है।</p>'
            },
            {   // 14 — ready + contact
                dur: 9000, audio: 'files/aq-audio/v15.mp3',
                html:
                    '<p class="kicker">You\'re ready</p>' +
                    '<h2>Register your <em>school</em></h2>' +
                    '<p class="body dev">कोई सवाल हो तो आर्यभट से बेझिझक पूछें।</p>' +
                    '<div class="contact-card">' +
                    '<div class="org">Aryabhat Foundation</div>' +
                    '<div class="addr">S-1, Swapnil Apartment VIII<br>258, Trilanga, Shahpura, Bhopal 462039</div>' +
                    '<a class="crow" href="mailto:aryabhat.foundation@gmail.com"><span class="em">✉️</span><span><b>aryabhat.foundation@gmail.com</b></span></a>' +
                    '<a class="crow" href="https://wa.me/919425674075" target="_blank" rel="noopener"><span class="em">💬</span><span>WhatsApp / Phone · <b>9425674075</b></span></a>' +
                    '<a class="crow" href="https://aryabhat.org" target="_blank" rel="noopener"><span class="em">🌐</span><span><b>aryabhat.org</b></span></a>' +
                    '</div>' +
                    '<div class="btnrow">' +
                    '<a class="story-btn" href="files/Institutional_format.xlsx" target="_blank" rel="noopener">⬇ Format</a>' +
                    '<a class="story-btn wa" href="https://wa.me/919425674075" target="_blank" rel="noopener">💬 WhatsApp us</a>' +
                    '</div>' +
                    '<div class="signoff">' +
                    '<div class="best-luck">Best of Luck!</div>' +
                    '<p class="best-luck-sub">शुभकामनाएँ! 🌟</p>' +
                    '</div>'
            }
        ];

        // ── Build DOM ──────────────────────────────────────────────
        var slidesEl = document.getElementById('slides');
        var progressEl = document.getElementById('progress');
        var frame = document.getElementById('frame');
        var slideEls = [], segEls = [], current = 0, paused = false;

        SLIDES.forEach(function (sl) {
            var d = document.createElement('div');
            d.className = 'slide';
            var inner = document.createElement('div');
            inner.className = 'slide-inner' + (sl.center ? ' center' : '');
            inner.innerHTML = sl.html;
            d.appendChild(inner);
            slidesEl.appendChild(d);
            slideEls.push(d);

            var seg = document.createElement('div');
            seg.className = 'pseg';
            var fill = document.createElement('span');
            fill.className = 'pseg-fill';
            seg.appendChild(fill);
            progressEl.appendChild(seg);
            segEls.push(seg);
        });

        // ── Voice-over ─────────────────────────────────────────────
        var voiceOn = false;
        var audioEl = new Audio();
        audioEl.preload = 'none';
        var voiceBtn = document.getElementById('voiceBtn');
        var voiceActive = false;   // audio is currently the timing source

        audioEl.addEventListener('ended', function () {
            if (voiceActive && current < SLIDES.length - 1) next();
        });

        function stopAudio() {
            voiceActive = false;
            try { audioEl.pause(); } catch (e) {}
        }
        function startVoice() {
            var sl = SLIDES[current];
            if (!voiceOn || !sl.audio) { voiceActive = false; return false; }
            audioEl.src = sl.audio;
            audioEl.currentTime = 0;
            var p = audioEl.play();
            voiceActive = true;
            if (p && p.catch) p.catch(function () { voiceActive = false; startRaf(); });
            return true;
        }
        function applyVoiceUI() {
            voiceBtn.classList.toggle('on', voiceOn);
            frame.classList.toggle('voice-on', voiceOn);
            voiceBtn.setAttribute('aria-label', voiceOn ? 'Mute voice-over' : 'Play voice-over');
            document.getElementById('voiceIcon').innerHTML = voiceOn
                ? '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/>'
                : '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
        }
        // Called from a genuine tap/click (required to unlock audio playback).
        function setVoice(on) {
            voiceOn = on;
            applyVoiceUI();
            if (!on) stopAudio();
            show(current);   // restart current slide, with or without narration
        }
        voiceBtn.addEventListener('click', function (e) {
            e.preventDefault(); e.stopPropagation();
            setVoice(!voiceOn);
        });
        var voiceCta = document.getElementById('voiceCta');
        if (voiceCta) voiceCta.addEventListener('click', function (e) {
            e.preventDefault(); e.stopPropagation();
            setVoice(true);
        });

        // ── Progress (rAF-driven) ──────────────────────────────────
        var rafId = null, lastTs = 0, segElapsed = 0, segDur = 0;
        function setFill(fill, p) { if (fill) fill.style.transform = 'scaleX(' + Math.max(0, Math.min(1, p)) + ')'; }
        function stopRaf() { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }
        function frameStep(ts) {
            var dt = lastTs ? (ts - lastTs) : 0;
            lastTs = ts;
            if (!paused) {
                if (voiceActive) {
                    var dur = audioEl.duration;
                    if (dur && isFinite(dur)) setFill(segEls[current].firstChild, audioEl.currentTime / dur);
                } else if (segDur > 0) {
                    segElapsed += dt;
                    var p = segElapsed / segDur;
                    setFill(segEls[current].firstChild, p);
                    if (p >= 1) {
                        setFill(segEls[current].firstChild, 1);
                        rafId = null;
                        // Auto-advance through the story, but let the final
                        // slide rest — never auto-exit while the reader is on
                        // the contact card. A manual tap/arrow still exits.
                        if (current < SLIDES.length - 1) next();
                        return;
                    }
                }
            }
            rafId = requestAnimationFrame(frameStep);
        }
        function startRaf() {
            stopRaf(); lastTs = 0; segElapsed = 0;
            rafId = requestAnimationFrame(frameStep);
        }

        function show(idx) {
            stopRaf(); stopAudio();
            current = idx;
            slideEls.forEach(function (el, i) { el.classList.toggle('active', i === idx); });
            frame.classList.toggle('cover', idx === 0);
            var inner = slideEls[idx].querySelector('.slide-inner');
            if (inner) inner.scrollTop = 0;

            segEls.forEach(function (seg, i) {
                seg.classList.toggle('done', i < idx);
                setFill(seg.firstChild, i < idx ? 1 : 0);
            });

            segDur = SLIDES[idx].dur;
            startVoice();
            if (reduced && !voiceActive) { setFill(segEls[idx].firstChild, 1); return; }
            // The cover is a landing screen: with narration off it waits for the
            // visitor to begin — the CTA starts it with voice, a tap anywhere
            // starts it silently. It never auto-advances on its own.
            if (idx === 0 && !voiceActive) return;
            startRaf();
        }
        function next() { if (current < SLIDES.length - 1) show(current + 1); else exit(); }
        function prev() { if (current > 0) show(current - 1); else show(0); }

        function pause() {
            paused = true; frame.classList.add('paused');
            if (voiceActive) { try { audioEl.pause(); } catch (e) {} }
            var hint = document.getElementById('tapHint'); if (hint) hint.style.opacity = '0';
        }
        function resume() {
            paused = false; frame.classList.remove('paused');
            if (voiceActive) { var p = audioEl.play(); if (p && p.catch) p.catch(function () {}); }
            var hint = document.getElementById('tapHint'); if (hint) hint.style.opacity = '';
        }
        function exit() {
            if (document.referrer && document.referrer.indexOf('quiz.html') !== -1) history.back();
            else window.location.href = 'quiz.html';
        }

        // ── Gestures ───────────────────────────────────────────────
        var pdown = null, holdTimer = null, holding = false;
        frame.addEventListener('pointerdown', function (e) {
            if (e.target.closest('.story-top')) return;
            if (e.target.closest('a, button')) return;   // let links/buttons work
            pdown = { x: e.clientX, y: e.clientY };
            holding = false;
            holdTimer = setTimeout(function () { holding = true; pause(); }, 220);
        });
        frame.addEventListener('pointerup', function (e) {
            if (!pdown) return;
            clearTimeout(holdTimer);
            var dx = e.clientX - pdown.x, dy = e.clientY - pdown.y;
            if (holding) { holding = false; resume(); pdown = null; return; }
            pdown = null;
            if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)) { if (dx < 0) next(); else prev(); return; }
            if (Math.abs(dx) < 12 && Math.abs(dy) < 12) {
                if (current === 0) { next(); return; }   // any tap begins the story
                var rect = frame.getBoundingClientRect();
                if ((e.clientX - rect.left) < rect.width * 0.32) prev(); else next();
            }
        });
        function cancelHold() { clearTimeout(holdTimer); if (holding) { holding = false; resume(); } pdown = null; }
        frame.addEventListener('pointercancel', cancelHold);
        frame.addEventListener('pointerleave', cancelHold);

        document.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
            else if (e.key === 'Escape') { exit(); }
        });
        document.getElementById('closeBtn').addEventListener('click', function (e) { e.preventDefault(); exit(); });

        // ── Share ──────────────────────────────────────────────────
        var toast = document.getElementById('toast');
        function showToast(msg) {
            toast.textContent = msg; toast.classList.add('show');
            setTimeout(function () { toast.classList.remove('show'); }, 1700);
        }
        document.getElementById('shareBtn').addEventListener('click', function (e) {
            e.preventDefault(); e.stopPropagation();
            var url = window.location.href.split('#')[0];
            var data = { title: 'Aryabhat Astronomy Quiz — guide for schools', text: 'A quick guide for schools to take part in the Aryabhat Astronomy Quiz.', url: url };
            if (navigator.share) { navigator.share(data).catch(function () {}); }
            else if (navigator.clipboard) { navigator.clipboard.writeText(url).then(function () { showToast('Link copied'); }); }
            else { showToast(url); }
        });

        // Auto-hide the tap hint after the first interaction.
        function hideHintOnce() {
            var hint = document.getElementById('tapHint');
            if (hint) hint.style.transition = 'opacity .4s', hint.style.opacity = '0';
            frame.removeEventListener('pointerdown', hideHintOnce);
        }
        setTimeout(function () {
            var hint = document.getElementById('tapHint');
            if (hint) { hint.style.transition = 'opacity .6s'; hint.style.opacity = '0'; }
        }, 4200);
        frame.addEventListener('pointerdown', hideHintOnce);

        show(0);
    })();
    </script>
