  <style>
    /* ==========================================================
       photos.html — design-system port (scoped: this page only)
       Content unchanged from the original; only presentation
       follows newindex.html / design.md.
       ========================================================== */

    /* Prevent horizontal scroll from any overflowing child
       (e.g., the floated navbar items from css/style.css). */
    html,
    body {
      overflow-x: hidden;
    }

    /* ============================================================
       NAVBAR — lifted from newindex.html
       ============================================================ */
    .navbar {
      position: relative;
      height: auto;
      min-height: 4.4rem;
      background:
        linear-gradient(180deg, rgba(10, 19, 28, 0.96) 0%, rgba(10, 19, 28, 0.86) 100%);
      -webkit-backdrop-filter: blur(16px) saturate(150%);
      backdrop-filter: blur(16px) saturate(150%);
      border-bottom: 1px solid rgba(255, 204, 51, 0.18);
      box-shadow: 0 4px 22px rgba(0, 0, 0, 0.4);
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .navbar::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }

    .navbar::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 2px;
      background: linear-gradient(90deg,
          transparent 0%,
          rgba(255, 204, 51, 0.18) 15%,
          rgba(255, 204, 51, 0.7) 50%,
          rgba(255, 204, 51, 0.18) 85%,
          transparent 100%);
      pointer-events: none;
    }

    .navbar > .container {
      width: max-content;
      min-width: 100%;
      min-height: 4.4rem;
      padding: 0 14px;
      display: flex;
      align-items: center;
    }

    .navbar-list {
      display: flex;
      flex-wrap: nowrap;
      white-space: nowrap;
      align-items: center;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .navbar-item {
      float: none !important;
      flex: 0 0 auto;
      border-bottom: none;
      padding: 0;
      margin-bottom: 0;
    }

    .navbar-item.current {
      background: transparent;
      border-radius: 0;
    }

    .navbar-link {
      display: inline-flex;
      align-items: center;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: .05em;
      text-transform: none;
      line-height: 1.3;
      color: var(--ink);
      margin: 0;
      padding: 11px 20px;
      border-radius: 999px;
      position: relative;
      transition: color .2s ease, background .2s ease, box-shadow .25s ease;
    }

    .navbar-link:hover,
    .navbar-link:focus {
      color: var(--gold-soft);
      background: rgba(255, 204, 51, 0.10);
      outline: 0;
    }

    .navbar-link.active {
      color: var(--gold);
      background: rgba(255, 204, 51, 0.12);
      font-family: var(--font-display);
      font-weight: 600;
      text-transform: none;
      border-radius: var(--brand-shape-tight);
      box-shadow:
        inset 0 0 0 1px rgba(255, 204, 51, 0.4),
        0 0 16px rgba(255, 204, 51, 0.12);
    }

    .navbar-link.active:hover,
    .navbar-link.active:focus {
      color: var(--gold-soft);
      background: rgba(255, 204, 51, 0.18);
    }

    @media (max-width: 700px) {
      .navbar {
        -webkit-mask-image: linear-gradient(90deg,
            #000 0%,
            #000 calc(100% - 56px),
            transparent 100%);
        mask-image: linear-gradient(90deg,
            #000 0%,
            #000 calc(100% - 56px),
            transparent 100%);
      }
    }

    @media (max-width: 600px) {
      .navbar,
      .navbar > .container {
        min-height: 3.5rem;
      }
      .navbar > .container {
        padding: 0 6px;
      }
      .navbar-list {
        gap: 4px;
      }
      .navbar-link {
        font-size: .88rem;
        padding: 8px 14px;
        letter-spacing: .04em;
      }
    }

    /* ============================================================
       TOKENS (mirror of newindex.html — see design.md §1)
       ============================================================ */
    :root {
      --gold: #ffcc33;
      --gold-deep: #ffa41b;
      --gold-soft: #ffe58a;
      --ink: #e6eef7;
      --ink-dim: #9fb3c8;
      --panel: #16223388;
      --panel-solid: #1a2636;
      --border: #2a3d55;
      --accent-cyan: #1EAEDB;
      --font-brand: 'renfrewregular', 'Space Grotesk', Arial, sans-serif;
      --font-display: 'Space Grotesk', 'Outfit', system-ui, sans-serif;
      --font-body: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --brand-shape: 10px;
      --brand-shape-tight: 8px;
    }

    html,
    body {
      font-family: var(--font-body);
    }

    .main h1,
    .main h2,
    .main h3,
    .main h4,
    .main h5,
    .main h6 {
      font-family: var(--font-display);
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .main {
      background-color: #0a131ccc;
      padding: 1.5rem 0 0;
      border-radius: 0;
    }

    /* ============================================================
       PHOTOS — frame around the EmbedSocial Instagram widget.
       Override the default .embedsocial-hashtag margins from
       css/style.css so the iframe sits flush in our wrapper.
       ============================================================ */
    .photos-wrap {
      max-width: 1000px;
      margin: 0 auto 2.4rem;
      padding: 0 12px;
    }

    .photos-wrap .embedsocial-hashtag {
      margin: 0;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
      background: var(--panel-solid);
    }

    .photos-wrap .embedsocial-hashtag iframe {
      border-radius: 18px;
      display: block;
    }

    /* The "Instagram widget" attribution link — tone it down so it
       doesn't compete with the actual gallery content */
    .photos-wrap .es-widget-branding {
      opacity: 0.5;
      font-size: 0.8em;
      transition: opacity .2s ease;
    }

    .photos-wrap .es-widget-branding:hover {
      opacity: 0.85;
    }

    /* ============================================================
       FOOTER
       ============================================================ */
    .footer-line {
      text-align: center;
      color: var(--ink-dim);
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin: 2.5rem 0 3rem;
      padding-bottom: 1.5rem;
    }

    /* ============================================================
       MOBILE
       ============================================================ */
    @media (max-width: 600px) {
      .main {
        padding-top: 1rem;
      }

      .photos-wrap {
        padding: 0 .5rem;
        margin-bottom: 1.6rem;
      }

      .photos-wrap .embedsocial-hashtag,
      .photos-wrap .embedsocial-hashtag iframe {
        border-radius: 14px;
      }

      .footer-line {
        font-size: .75rem;
        letter-spacing: .12em;
        margin: 1.8rem 0 2.2rem;
        padding-bottom: 1rem;
      }
    }
  </style>
