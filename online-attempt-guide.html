<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google Analytics 4 (centralized in /js/analytics.js) -->
    <script src="/js/analytics.js"></script>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>How to attempt the online quiz · Aryabhat</title>
    <meta name="description" content="Step-by-step instructions for students appearing for the Aryabhat Astronomy Quiz through their school — login at quiz.aryabhat.org/school, roll number, password and the do's and don'ts during the quiz.">
    <meta name="author" content="Aryabhat Foundation">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Aryabhat Foundation">
    <meta property="og:title" content="Aryabhat Astronomy Quiz — how to attempt the online quiz">
    <meta property="og:description" content="For students appearing through school: login, roll number, password, and what to do during the quiz. आर्यभट ऑनलाइन क्विज़ देने के आसान चरण.">
    <meta property="og:image" content="https://aryabhat.org/images/aq/isro.jpg">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --gold: #ffcc33;
            --gold-deep: #ffa41b;
            --gold-soft: #ffe58a;
            --ink: #e6eef7;
            --ink-dim: #9fb3c8;
            --panel: #16223388;
            --panel-solid: #1a2636;
            --border: #2a3d55;
            --accent-cyan: #1EAEDB;
            --green: #66bb6a;
            --red: #ef5350;
            --font-brand: 'renfrewregular', 'Space Grotesk', Arial, sans-serif;
            --font-display: 'Space Grotesk', 'Outfit', system-ui, sans-serif;
            --font-body: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-dev: 'Noto Sans Devanagari', 'Outfit', system-ui, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace;
            --brand-shape: 10px;
        }

        /* Aryabhat brand wordmark font (design.md §1) */
        @font-face {
            font-family: 'renfrewregular';
            src: url('css/renfrew-webfont.woff2') format('woff2'),
                 url('css/renfrew-webfont.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #04060a;
            font-family: var(--font-body);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }

        /* ============================================================
           STORIES SHELL — phone-column on desktop, full-bleed on phone
           ============================================================ */
        #stories {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .story-frame {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100%;
            max-height: 100vh;
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 120%, #14243a 0%, #0a1018 55%, #04060a 100%);
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: pan-y;
        }

        @media (min-width: 620px) {
            #stories { padding: 18px; }
            .story-frame {
                height: min(92vh, 860px);
                border-radius: 22px;
                box-shadow: 0 20px 70px rgba(0, 0, 0, .6), 0 0 0 1px rgba(255, 204, 51, .10);
            }
        }

        /* ---- Progress segments ---- */
        .progress-row {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 6;
            display: flex;
            gap: 4px;
            padding: 10px 12px 6px;
            padding-top: max(10px, env(safe-area-inset-top));
            pointer-events: none;
        }
        .pseg {
            flex: 1 1 0;
            height: 4px;
            border-radius: 4px;
            background: rgba(255, 255, 255, .16);
            overflow: hidden;
        }
        .pseg-fill {
            display: block;
            height: 100%;
            width: 100%;
            transform: scaleX(0);
            transform-origin: left center;
            background: linear-gradient(90deg, var(--gold-deep), var(--gold));
            box-shadow: 0 0 5px rgba(255, 204, 51, .55);
            border-radius: 4px;
        }

        /* ---- Top bar ---- */
        .story-top {
            position: absolute;
            left: 0; right: 0;
            top: calc(14px + env(safe-area-inset-top));
            z-index: 6;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px 0;
        }
        .story-brand {
            font-family: var(--font-brand);
            font-size: 1.05rem;
            letter-spacing: .02em;
            color: var(--ink);
            text-shadow: 0 0 8px rgba(255, 255, 255, .35), 0 2px 3px rgba(0, 0, 0, .6);
            white-space: nowrap;
            flex: 0 1 auto;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .top-controls {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
        }
        .story-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            width: 32px;
            height: 32px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, .22);
            background: rgba(10, 19, 28, .5);
            color: var(--ink);
            font-size: 1.05rem;
            line-height: 1;
            text-decoration: none;
            cursor: pointer;
            padding: 0;
        }
        .story-icon svg { width: 17px; height: 17px; display: block; }
        .story-icon:hover { background: rgba(255, 255, 255, .12); }
        #shareBtn { color: var(--gold); border-color: rgba(255, 204, 51, .4); }

        .story-toast {
            position: absolute;
            left: 50%;
            bottom: calc(58px + env(safe-area-inset-bottom));
            transform: translateX(-50%) translateY(10px);
            z-index: 8;
            padding: 9px 16px;
            border-radius: 999px;
            background: rgba(10, 19, 28, .92);
            border: 1px solid rgba(255, 204, 51, .4);
            color: var(--gold-soft);
            font-family: var(--font-display);
            font-size: .8rem;
            font-weight: 600;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s ease, transform .25s ease;
        }
        .story-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ---- Slides ---- */
        .slides { position: absolute; inset: 0; z-index: 1; }
        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity .38s ease;
            display: flex;
        }
        .slide.active { opacity: 1; visibility: visible; }

        .slide-inner {
            position: relative;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 78px 26px calc(70px + env(safe-area-inset-bottom));
            scrollbar-width: none;
        }
        .slide-inner::-webkit-scrollbar { display: none; }
        .slide-inner.center { justify-content: center; }
        .slide-inner > * { max-width: 100%; }

        .kicker {
            font-family: var(--font-display);
            font-size: .72rem;
            font-weight: 600;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: var(--gold);
            margin: 0 0 10px;
        }
        .slide h2 {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(1.6rem, 6.6vw, 2.2rem);
            line-height: 1.1;
            letter-spacing: -0.01em;
            margin: 0 0 2px;
        }
        .slide h2 em { color: var(--gold); font-style: normal; }
        .slide .devnag {
            font-family: var(--font-dev);
            font-size: 1.12rem;
            color: var(--gold-soft);
            margin: 8px 0 0;
            letter-spacing: .01em;
            line-height: 1.5;
        }
        .slide p.body {
            font-size: clamp(.96rem, 3.6vw, 1.05rem);
            line-height: 1.55;
            color: var(--ink);
            margin: 16px 0 0;
            max-width: min(30rem, 100%);
        }
        .slide p.body.dev { font-family: var(--font-dev); }
        .slide p.body.dim { color: var(--ink-dim); }

        /* reassurance chip */
        .vischip {
            margin: 18px 0 0;
            display: inline-flex;
            flex-direction: column;
            gap: 3px;
            align-items: center;
            padding: 11px 20px;
            border-radius: 14px;
            background: rgba(102, 187, 106, .10);
            border: 1px solid rgba(102, 187, 106, .35);
            max-width: min(30rem, 100%);
        }
        .vischip .when {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1rem;
            color: #b7f5c0;
        }
        .vischip .where { font-size: .82rem; color: var(--ink-dim); }
        /* warning-flavoured variant of the same chip */
        .vischip.warn { background: rgba(239, 83, 80, .10); border-color: rgba(239, 83, 80, .4); }
        .vischip.warn .when { color: #ffb3b0; }

        /* fact pills */
        .facts {
            list-style: none;
            margin: 18px 0 0;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            justify-content: center;
            max-width: min(30rem, 100%);
        }
        .facts li {
            font-size: .78rem;
            line-height: 1.3;
            color: var(--ink-dim);
            background: rgba(255, 255, 255, .045);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 12px;
        }
        .facts li b { color: var(--ink); font-weight: 600; }

        /* ---- numbered / feature cards ---- */
        .cardlist {
            list-style: none;
            margin: 24px 0 6px;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: min(28rem, 100%);
            flex: 1 1 auto;
            justify-content: center;
        }
        .cardlist li {
            display: flex;
            gap: 16px;
            align-items: center;
            text-align: left;
            background: linear-gradient(160deg, rgba(30, 45, 66, .7), rgba(15, 26, 38, .7));
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 19px;
            flex: 1 1 0;
            min-height: 84px;
            max-height: 160px;
        }
        .cardlist .idx {
            flex: 0 0 auto;
            width: 38px; height: 38px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.15rem;
            color: #04060a;
            background: linear-gradient(180deg, var(--gold), var(--gold-deep));
            box-shadow: 0 0 12px rgba(255, 204, 51, .3);
        }
        .cardlist .ico {
            flex: 0 0 auto;
            font-size: 2rem;
            width: 40px; text-align: center;
            filter: drop-shadow(0 0 8px rgba(255, 204, 51, .25));
        }
        .cardlist .txt { min-width: 0; }
        .cardlist .en {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.08rem;
            line-height: 1.2;
            color: var(--ink);
            display: block;
        }
        .cardlist .hi {
            font-family: var(--font-dev);
            font-size: .92rem;
            color: var(--ink-dim);
            display: block;
            margin-top: 4px;
            line-height: 1.45;
        }
        /* red-flavoured cards for the "never do this" list */
        .cardlist.dont li { background: linear-gradient(160deg, rgba(66, 30, 32, .7), rgba(38, 16, 18, .7)); border-color: rgba(239, 83, 80, .35); }
        .cardlist.dont .ico { filter: drop-shadow(0 0 8px rgba(239, 83, 80, .35)); }

        /* ============================================================
           SCREEN MOCKS — the pieces the child will actually see
           ============================================================ */
        .mock {
            width: 100%;
            max-width: min(27rem, 100%);
            margin: 18px 0 0;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: linear-gradient(160deg, rgba(30, 45, 66, .8), rgba(15, 26, 38, .85));
            overflow: hidden;
            text-align: left;
        }
        /* browser chrome + address bar */
        .mock-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 12px;
            background: rgba(255, 255, 255, .05);
            border-bottom: 1px solid var(--border);
        }
        .mock-dots { display: flex; gap: 5px; flex: 0 0 auto; }
        .mock-dots i { width: 9px; height: 9px; border-radius: 50%; background: rgba(255, 255, 255, .22); display: block; }
        .mock-url {
            flex: 1 1 auto;
            min-width: 0;
            background: rgba(4, 6, 10, .6);
            border: 1px solid rgba(255, 204, 51, .3);
            border-radius: 999px;
            padding: 7px 13px;
            font-family: var(--font-mono);
            font-size: .84rem;
            color: var(--gold-soft);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .mock-url b { color: #fff; font-weight: 700; }
        .mock-body { padding: 15px 16px 17px; }

        /* labelled input row inside a mock */
        .field-label {
            font-family: var(--font-display);
            font-size: .78rem;
            font-weight: 600;
            letter-spacing: .05em;
            text-transform: uppercase;
            color: var(--ink-dim);
            margin: 0 0 9px;
        }
        .digits { display: flex; gap: 7px; justify-content: center; }
        .digits span {
            flex: 1 1 0;
            max-width: 46px;
            aspect-ratio: 3 / 4;
            display: flex; align-items: center; justify-content: center;
            border-radius: 9px;
            border: 1px solid var(--border);
            background: rgba(4, 6, 10, .55);
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: clamp(1.05rem, 5vw, 1.4rem);
            color: var(--gold);
        }
        .digits span.sep {
            max-width: 14px; border: 0; background: none;
            color: var(--ink-dim); font-size: 1.2rem;
        }
        .digit-note {
            margin: 11px 0 0;
            font-size: .8rem;
            color: var(--ink-dim);
            text-align: center;
            line-height: 1.45;
        }
        .digit-note b { color: var(--gold-soft); font-weight: 600; }

        /* Masked field for the password. Deliberately shows dots, not characters —
           the scheme varies by school and must never be shown here. */
        .pwfield {
            display: flex; align-items: center; justify-content: center;
            height: 52px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(4, 6, 10, .55);
        }
        .pwfield .dots {
            font-family: var(--font-mono);
            font-size: 1.7rem;
            letter-spacing: .42em;
            text-indent: .42em;   /* balance the trailing letter-space */
            color: var(--gold);
            line-height: 1;
        }

        /* the "is this your name?" header strip */
        .namebar {
            display: flex; align-items: center; gap: 11px;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(102, 187, 106, .10);
            border: 1px solid rgba(102, 187, 106, .35);
        }
        .namebar .av {
            flex: 0 0 auto;
            width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
            background: rgba(255, 255, 255, .07);
        }
        .namebar .nm { display: block; font-family: var(--font-display); font-weight: 600; font-size: 1rem; color: var(--ink); }
        .namebar .cls { display: block; font-size: .78rem; color: var(--ink-dim); margin-top: 2px; }
        .namebar .tick { margin-left: auto; color: #b7f5c0; font-size: 1.2rem; }

        /* fake primary button inside a mock */
        .mock-btn {
            margin: 14px 0 0;
            display: block;
            width: 100%;
            text-align: center;
            padding: 12px 16px;
            border-radius: var(--brand-shape);
            font-family: var(--font-display);
            font-weight: 600;
            font-size: .95rem;
            color: #04060a;
            background: linear-gradient(180deg, var(--gold-soft), var(--gold));
            box-shadow: 0 6px 18px rgba(255, 164, 27, .22);
        }

        /* big warning glyph */
        .warn-glyph {
            font-size: clamp(3.4rem, 17vw, 4.6rem);
            line-height: 1;
            margin: 4px 0 2px;
            filter: drop-shadow(0 0 18px rgba(239, 83, 80, .45));
            animation: warnPulse 2.2s ease-in-out infinite;
        }
        @keyframes warnPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.07); } }

        /* ---- clock / dial visuals ---- */
        .dial-wrap {
            width: min(52vw, 210px);
            height: min(52vw, 210px);
            margin: 12px 0 4px;
            flex: 0 0 auto;
        }
        .dial-wrap svg { width: 100%; height: 100%; display: block; }

        /* ---- contact card ---- */
        .contact-card {
            width: 100%;
            max-width: min(27rem, 100%);
            margin: 20px 0 0;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: linear-gradient(160deg, rgba(30, 45, 66, .7), rgba(15, 26, 38, .8));
            padding: 15px 17px;
            text-align: left;
        }
        .contact-card .org { font-family: var(--font-brand); font-weight: 400; font-size: 1.25rem; letter-spacing: .01em; color: var(--gold); text-shadow: 0 0 10px rgba(255, 204, 51, .2); }
        .contact-card .addr { font-size: .82rem; color: var(--ink-dim); margin: 3px 0 11px; }
        .contact-card a.crow {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 0;
            border-top: 1px solid rgba(255, 255, 255, .08);
            color: var(--ink); text-decoration: none; font-size: .9rem;
        }
        .contact-card a.crow .em { font-size: 1.1rem; width: 22px; text-align: center; }
        .contact-card a.crow b { color: var(--ink); font-weight: 600; }

        .btnrow {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
            margin: 20px 0 0; width: 100%; max-width: min(27rem, 100%);
        }
        .story-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 46px;
            padding: 0 20px;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: .9rem;
            color: var(--gold);
            text-decoration: none;
            background: linear-gradient(180deg, #1a2638 0%, #0d1722 100%);
            border: 1.5px solid var(--gold);
            border-radius: var(--brand-shape);
            box-shadow: 0 0 22px rgba(255, 204, 51, .16);
            cursor: pointer;
            flex: 0 0 auto;
            justify-content: center;
        }
        .btnrow .story-btn { flex: 1 1 auto; }

        /* ---- closing "Best of Luck" sign-off ---- */
        .signoff {
            margin: auto 0;
            padding-top: 14px;
            width: 100%;
            max-width: min(27rem, 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .best-luck {
            font-family: var(--font-brand);
            font-size: clamp(1.9rem, 9.5vw, 2.5rem);
            line-height: 1.02;
            letter-spacing: .01em;
            background: linear-gradient(100deg, var(--gold-deep) 0%, var(--gold-soft) 28%, #fff 48%, var(--gold-soft) 68%, var(--gold-deep) 100%);
            background-size: 220% auto;
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; color: transparent;
            filter: drop-shadow(0 0 14px rgba(255, 204, 51, .35));
            animation: luckShimmer 3.4s linear infinite, luckPulse 2.8s ease-in-out infinite;
        }
        .best-luck-sub {
            font-family: var(--font-dev);
            font-size: 1.22rem;
            color: var(--gold-soft);
            margin: 2px 0 0;
        }
        @keyframes luckShimmer { to { background-position: 220% center; } }
        @keyframes luckPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }

        /* ---- cover ---- */
        .visual-stars {
            width: min(72vw, 260px);
            height: 100px;
            margin: 2px 0 4px;
            flex: 0 0 auto;
        }
        .visual-stars .starfield { display: block; width: 100%; height: 100%; }
        .cover-brand {
            margin-top: auto;
            padding-top: 26px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
        }
        .cover-logo {
            height: clamp(78px, 24vw, 104px);
            width: auto;
            max-width: 78%;
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, .6))
                    drop-shadow(0 0 16px rgba(255, 255, 255, .22))
                    drop-shadow(2px 4px 5px rgba(0, 0, 0, .5));
        }
        .story-frame.cover .story-mark { display: none; }
        .cover-start {
            margin: 22px 0 0;
            font-family: var(--font-display);
            font-size: .9rem;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: .04em;
        }
        .cover-start small { display: block; font-family: var(--font-dev); font-weight: 500; font-size: .76rem; color: var(--ink-dim); margin-top: 4px; letter-spacing: 0; }

        .tap-hint {
            position: absolute;
            bottom: calc(14px + env(safe-area-inset-bottom));
            left: 0; right: 0;
            z-index: 4;
            text-align: center;
            font-size: .72rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: rgba(230, 238, 247, .5);
            pointer-events: none;
        }

        .story-mark {
            position: absolute;
            left: 13px;
            bottom: calc(10px + env(safe-area-inset-bottom));
            height: 32px;
            width: auto;
            z-index: 5;
            opacity: .85;
            pointer-events: none;
            filter: drop-shadow(0 0 1.2px rgba(255, 255, 255, .95)) drop-shadow(0 1px 2px rgba(0, 0, 0, .55));
        }

        /* fade-in of slide content */

        function hideHintOnce() {
            var hint = document.getElementById('tapHint');
            if (hint) hint.style.transition = 'opacity .4s', hint.style.opacity = '0';
            frame.removeEventListener('pointerdown', hideHintOnce);
        }
        setTimeout(function () {
            var hint = document.getElementById('tapHint');
            if (hint) { hint.style.transition = 'opacity .6s'; hint.style.opacity = '0'; }
        }, 4200);
        frame.addEventListener('pointerdown', hideHintOnce);

        show(0);
    })();
    </script>
</body>

</html>
